services:
  db:
    image: mysql:9.0
    restart: always
    container_name: squadlink_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: SquadLink
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 20s
      retries: 10
      interval: 3s
      start_period: 10s

  backend:
    image: node:22
    container_name: squadlink_backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root
      - DB_NAME=SquadLink
      - PORT=3000
      - NODE_ENV=development
    command: bash -c "npm install && npm start"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  mysql_data:
